name: Auto Sync Upstream & Build APK

on:
  schedule:
    # 每周五 北京时间16:00（UTC 08:00）自动触发，你可以调整分钟和小时
    - cron: '0 8 * * 5'
  workflow_dispatch: # 支持手动触发

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 允许推送
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git config
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/xiaoyaocz/dart_simple_live.git
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git merge --allow-unrelated-histories --no-edit upstream/master || true

      - name: Push merged changes to your repo
        run: |
          git push origin master

      # 后面是原有的云端打包步骤
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: simple_live_app

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mykeystore.jks
        working-directory: simple_live_app/android

      - name: Create key.properties
        run: |
          echo "storeFile=mykeystore.jks" > key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
        working-directory: simple_live_app/android

      - name: Build Signed APK
        run: flutter build apk --release
        working-directory: simple_live_app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
