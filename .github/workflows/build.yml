name: Build App
on:
  workflow_dispatch: # 支持手动触发
  push:
    tags:
      - 'v*' # 当你推送到以 v 开头的标签时触发 (如 v1.0.0)

jobs:
  build:
    name: Build APK and Windows
    runs-on: windows-latest # 使用 Windows 虚拟机，这样可以同时打 Windows 和 Android 包

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/x64/runner/Release/
