name: Build Android + Windows

on:
  schedule:
    # 每周五 北京时间16:00（UTC 08:00）自动触发
    - cron: '0 8 * * 5'
  workflow_dispatch: # 支持手动触发

jobs:
  # 同步上游代码
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git config
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/xiaoyaocz/dart_simple_live.git || true
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git merge --allow-unrelated-histories --no-edit upstream/master || true

      - name: Push merged changes to your repo
        run: |
          git push origin master

  # 编译 Android APK
  build-android:
    runs-on: ubuntu-latest
    needs: sync-upstream
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mykeystore.jks
        working-directory: simple_live_app/android

      - name: Create key.properties
        run: |
          echo "storeFile=mykeystore.jks" > key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
        working-directory: simple_live_app/android

      - name: Build Signed APK (arm64-v8a)
        run: |
          cd simple_live_app
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-apk
          path: simple_live_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

  # 编译 Windows 版本
  build-windows:
    runs-on: windows-latest
    needs: sync-upstream
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          cache: true

      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      - name: Decode fixed certificate
        run: |
          # 从 Secrets 读取固定证书并解码
          $certBytes = [System.Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}")
          [System.IO.File]::WriteAllBytes("${{ github.workspace }}\simple_live_app\windows\SimpleLive_Fixed.pfx", $certBytes)
        shell: pwsh

      - name: Build Windows (MSIX without signing)
        run: |
          cd simple_live_app
          # 构建未签名的 MSIX
          flutter_distributor package --platform windows --targets msix --skip-clean
        shell: pwsh

      - name: Sign MSIX with SignTool
        run: |
          # 找到 Windows SDK 中的 SignTool
          $signTool = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe"
          if (-not (Test-Path $signTool)) {
            # 尝试其他版本
            $signTool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Select-Object -First 1).FullName
          }
          
          Write-Host "Using SignTool: $signTool"
          
          # 找到生成的 MSIX 文件
          $msixPath = Get-ChildItem -Path "simple_live_app\build\dist\*.msix" | Select-Object -First 1
          
          if ($msixPath) {
            Write-Host "Found MSIX: $($msixPath.FullName)"
            
            # 使用 SignTool 签名 MSIX
            & $signTool sign /f "${{ github.workspace }}\simple_live_app\windows\SimpleLive_Fixed.pfx" /p "${{ secrets.WINDOWS_PFX_PASSWORD }}" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $msixPath.FullName
            
            if ($LASTEXITCODE -eq 0) {
              Write-Host "MSIX signed successfully!"
            } else {
              Write-Host "SignTool failed with exit code: $LASTEXITCODE"
            }
          } else {
            Write-Host "No MSIX file found!"
          }
        shell: pwsh

      - name: Upload Signed MSIX to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix-signed
          path: simple_live_app/build/dist/**/*.msix
          retention-days: 90
