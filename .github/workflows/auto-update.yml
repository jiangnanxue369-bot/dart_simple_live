name: Auto Update and Build

on:
  schedule:
    - cron: '0 0 */3 * *'  # 每3天执行一次
  workflow_dispatch:  # 支持手动触发

jobs:
  check-update-and-build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Check for upstream updates
        run: |
          # 添加原作者仓库作为上游
          git remote add upstream https://github.com/jiangnanxue369-bot/dart_simple_live.git
          # 拉取上游最新代码
          git fetch upstream
          # 检查是否有更新
          if git diff HEAD upstream/master --name-only | grep -q .; then
            echo "UPSTREAM_UPDATED=true" >> $GITHUB_ENV
            echo "有代码更新，准备合并并构建"
          else
            echo "UPSTREAM_UPDATED=false" >> $GITHUB_ENV
            echo "没有代码更新，跳过构建"
          fi

      - name: Merge upstream updates
        if: env.UPSTREAM_UPDATED == 'true'
        run: |
          # 合并上游更新
          git merge upstream/master
          # 推送更新到自己的仓库
          git push origin master

      - name: Setup Java
        if: env.UPSTREAM_UPDATED == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        if: env.UPSTREAM_UPDATED == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        if: env.UPSTREAM_UPDATED == 'true'
        run: flutter pub get
        working-directory: ./simple_live_app

      - name: Build APK
        if: env.UPSTREAM_UPDATED == 'true'
        run: flutter build apk --release
        working-directory: ./simple_live_app

      - name: Build Windows
        if: env.UPSTREAM_UPDATED == 'true'
        run: flutter build windows --release
        working-directory: ./simple_live_app

      - name: Upload Artifacts
        if: env.UPSTREAM_UPDATED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: auto-update-builds
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-release.apk
            simple_live_app/build/windows/x64/runner/Release/